[build]
  command   = "npm run build"
  publish   = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

# Functions go first so /.netlify/functions/* and /api/* hit them, not the SPA fallback
[[redirects]]
  from   = "/api/ai"
  to     = "/.netlify/functions/ai"
  status = 200

# Redirect all other routes to index.html so React SPA navigation works
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
